server {
    listen 8080;
    server_name localhost;

    # Support large file transfers
    client_max_body_size 10G;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Dedicated location for large downloads
    location /downloads/ {
        root /usr/share/nginx/html;
        autoindex on;
        # Force download instead of trying to open in browser
        add_header Content-Disposition 'attachment';
        # Disable buffering to prevent container memory/disk exhaustion
        proxy_buffering off;
        # Ensure we don't timeout on large files
        send_timeout 3600s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
